name: Build Windows
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  buildWindows:
    runs-on: windows-latest

    steps:
      # 1. Checkout the code
      - name: Checkout
        uses: actions/checkout@v3

      # 2. Setup Haxe (Matching your guide's 4.2.5 requirement)
      - name: Setup Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.2.5

      - name: Install Dependencies
        run: ./install_deps.bat

      # 5. Compile the Game
      - name: Compile Game
        run: haxelib run lime build windows -final

      # 6. Upload the result (Updated to v4)
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CDEV-Engine-Build
          path: export/release/windows/bin
